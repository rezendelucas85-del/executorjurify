<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda de Audiências</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">
        <h1>Agenda Jurídica</h1>
        <p>Dr. Silva & Associados</p>
      </div>
      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-auth="login">Entrar</button>
        <button type="button" class="auth-tab" data-auth="register">Cadastrar</button>
      </div>
      <form id="authForm" novalidate>
        <div class="auth-fields">
          <label class="auth-label">Email
            <input type="email" id="authEmail" placeholder="seu@dominio.com" required />
          </label>
          <label class="auth-label">Senha
            <input type="password" id="authPassword" placeholder="••••••••" required />
          </label>
          <label class="auth-label auth-name-field hidden">Nome
            <input type="text" id="authName" placeholder="Seu nome completo" />
          </label>
        </div>
        <button type="submit" id="authSubmit" class="auth-submit">Entrar</button>
        <p class="auth-help" id="authHelp">Ainda não tem conta? Faça seu cadastro.</p>
      </form>
    </div>
  </div>

  <div class="app-shell hidden">
    <header class="topbar">
      <div>
        <h1>Agenda Jurídica</h1>
        <p>Dr. Silva & Associados</p>
      </div>
      <div class="header-actions">
        <div class="user-panel">
          <span id="userBadge"></span>
          <button id="logoutBtn" class="logout-btn hidden">Sair</button>
        </div>
        <button id="newHearingBtn">+ Nova audiência</button>
        <button id="exportBtn">↓ Exportar PDF</button>
      </div>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="agenda">Agenda</button>
      <button class="tab" data-tab="history">Histórico</button>
    </div>

    <div id="alertBar" class="alert-bar hidden" role="status" aria-live="polite">
      <strong>Alerta sonoro ativo:</strong>
      <span id="alertText">Há audiência pendente em até 1 hora.</span>
    </div>

    <main>
      <section id="agendaTab" class="tab-panel active"></section>
      <section id="historyTab" class="tab-panel"></section>
    </main>
  </div>

  <div id="modal" class="modal hidden" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" aria-label="Fechar">×</button>
      <h2 id="modalTitle">Nova audiência</h2>
      <form id="hearingForm" novalidate>
        <div class="form-grid">
          <label>Data
            <input type="date" id="date" required />
          </label>
          <label>Hora
            <input type="time" id="time" required />
          </label>
          <label>Vara
            <input type="text" id="vara" placeholder="Ex: Vara Criminal 2" required />
          </label>
          <label>Tipo
            <select id="type" required>
              <option value="">Selecione</option>
              <option>Conciliação</option>
              <option>Instrução</option>
              <option>Julgamento</option>
              <option>Audiencia de custódia</option>
            </select>
          </label>
          <label>Categoria
            <select id="category" required>
              <option value="">Selecione</option>
              <option>Cível</option>
              <option>Criminal</option>
              <option>Trabalhista</option>
              <option>Família</option>
            </select>
          </label>
          <label>Juiz(a)
            <input type="text" id="judge" placeholder="Nome do magistrado" required />
          </label>
          <label>Processo
            <input type="text" id="process" placeholder="Número do processo" required />
          </label>
        </div>
        <label>Orientações
          <textarea id="notes" placeholder="Informações adicionais, peças, observações..." rows="5"></textarea>
        </label>
        <label>Upload de documentos (PDF / DOC)
          <input type="file" id="documents" accept=".pdf,.doc,.docx" multiple />
          <p class="note">Os arquivos aparecerão na ficha da audiência após salvar.</p>
        </label>
        <div id="filePreview" class="file-preview"></div>
        <div class="form-actions">
          <button type="button" class="cancel-btn" id="cancelBtn">Cancelar</button>
          <button type="submit" class="save-btn">Salvar audiência</button>
        </div>
      </form>
    </div>
  </div>

  <div id="printPreview" class="modal hidden" aria-hidden="true">
    <div class="modal-content preview-content">
      <button class="modal-close" id="closePreview" aria-label="Fechar visualização">×</button>
      <div class="preview-header">
        <div>
          <h2>Prévia da agenda</h2>
          <p>Confira todas as audiências com status antes de imprimir ou salvar em PDF.</p>
        </div>
        <div class="preview-toolbar">
          <button class="print-btn" id="printBtn">Imprimir / Salvar</button>
          <button class="close-print" id="closePrintPreview">Fechar</button>
        </div>
      </div>
      <div id="previewList" class="preview-list"></div>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
